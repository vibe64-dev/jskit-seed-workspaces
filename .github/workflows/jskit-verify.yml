# Generated and managed by JSKIT. Run `npx jskit app sync-ci` to regenerate.
# Put application-specific CI in a separate workflow; edits to this file are not merged.
name: JSKIT Verify
on:
  pull_request: null
  push:
    branches:
      - main
permissions:
  contents: read
env:
  npm_config_engine_strict: "true"
  npm_config_strict_allow_scripts: "true"
jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      AUTH_LOCAL_BACKEND: db
      AUTH_PROVIDER: local
      DB_CLIENT: mysql2
      DB_HOST: 127.0.0.1
      DB_NAME: jskit_ci
      DB_PASSWORD: jskit_ci_only_password
      DB_PORT: "33060"
      DB_USER: jskit_ci
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: jskit_ci
          MARIADB_PASSWORD: jskit_ci_only_password
          MARIADB_ROOT_PASSWORD: jskit_ci_only_root_password
          MARIADB_USER: jskit_ci
        ports:
          - 33060:3306
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=10
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v7
      - id: setup-node
        name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
      - id: install-dependencies
        name: Install dependencies
        run: npm ci
      - id: database-migrations
        name: Apply database migrations
        run: npm run db:migrate
      - id: verify
        name: Run verification
        run: npm run verify
